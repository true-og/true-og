# This is a world configuration file for Paper.
# This file may start empty but can be filled with settings to override ones in the config/paper-world-defaults.yml
#
# World: world (minecraft:overworld)
# License: https://raw.githubusercontent.com/true-og/Paper/refs/heads/main/LICENSE.md

_version: 30
anticheat:
  anti-xray:
    enabled: true
    engine-mode: 1
    # Block entities (spawner, chest, ender_chest, shulker_box) intentionally excluded:
    # AntiPieRay-OG owns those via packet-level TileEntity hiding.
    hidden-blocks:
    - diamond_ore
    - deepslate_diamond_ore
    - emerald_ore
    - deepslate_emerald_ore
    - gold_ore
    - deepslate_gold_ore
    - iron_ore
    - deepslate_iron_ore
    - lapis_ore
    - deepslate_lapis_ore
    - mossy_cobblestone
    - redstone_ore
    - deepslate_redstone_ore
    - copper_ore
    - deepslate_copper_ore
    - deepslate_coal_ore
    replacement-blocks:
    - stone
    lava-obscures: false
    max-block-height: 128
    update-radius: 2
    use-permission: false

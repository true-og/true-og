# This is a world configuration file for Paper.
# This file may start empty but can be filled with settings to override ones in the config/paper-world-defaults.yml
#
# World: world_nether (minecraft:the_nether)
# License: https://raw.githubusercontent.com/true-og/Paper/refs/heads/main/LICENSE.md
#
# Anti-Xray is dimension-sensitive: hidden-blocks must match terrain materials in
# replacement-blocks, otherwise engine-mode 1 will replace ores with the wrong rock type.

_version: 30
anticheat:
  anti-xray:
    enabled: true
    engine-mode: 1
    hidden-blocks:
    - ancient_debris
    - nether_gold_ore
    - nether_quartz_ore
    replacement-blocks:
    - netherrack
    - basalt
    - blackstone
    lava-obscures: true
    max-block-height: 128
    update-radius: 2
    use-permission: false
